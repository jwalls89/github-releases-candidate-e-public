name: Setup Python
description: Install uv, Python, and project dependencies

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c2af426c12a8 # v6.1.0

    - name: Install Python
      shell: bash
      run: uv python install

    - name: Install dependencies
      shell: bash
      run: uv sync
