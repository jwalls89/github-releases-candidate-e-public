name: Setup Python
description: Install uv, Python, and project dependencies

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Install Python
      shell: bash
      run: uv python install

    - name: Install dependencies
      shell: bash
      run: uv sync
