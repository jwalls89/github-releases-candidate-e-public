name: Hotfix

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Release version to hotfix (e.g., 1.3.0) — must have a final release tag"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout from base release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ inputs.base_version }}

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Create hotfix
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run invoke release.hotfix --base-version "${{ inputs.base_version }}"
