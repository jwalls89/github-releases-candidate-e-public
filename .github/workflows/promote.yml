name: Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RC tag to promote (e.g., v1.2.0-rc.1)"
        required: true
        type: string

concurrency:
  group: promote
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Validate promotion
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run invoke release.validate-promotion --version "${{ inputs.version }}"

  deploy-test:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    with:
      environment: test
      version: ${{ needs.validate.outputs.version }}

  deploy-preprod:
    needs: [validate, deploy-test]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: preprod
      version: ${{ needs.validate.outputs.version }}

  deploy-prod:
    needs: [validate, deploy-preprod]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      version: ${{ needs.validate.outputs.version }}

  finalise:
    needs: [validate, deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Finalise promotion
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run invoke release.finalise-promotion --version "${{ needs.validate.outputs.version }}"
