name: Cut Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string

concurrency:
  group: cut-release

permissions:
  contents: write
  actions: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Normalise and validate version
        run: |
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in semver format (e.g., 1.2.0 or v1.2.0)"
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Check version is higher than last release
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [[ -n "$LATEST_TAG" ]]; then
            LATEST="${LATEST_TAG#v}"
            echo "Latest release: ${LATEST}"
            HIGHER=$(echo -e "${LATEST}\n${VERSION}" | sort -V | tail -1)
            if [[ "${HIGHER}" == "${LATEST}" ]]; then
              echo "::error::Version ${VERSION} is not higher than the latest release ${LATEST}"
              exit 1
            fi
          fi

      - name: Check no other release is in-flight
        run: |
          BRANCHES=$(git ls-remote --heads origin 'release/*' | awk '{print $2}' | sed 's|refs/heads/||')
          for BRANCH in $BRANCHES; do
            BRANCH_VERSION=$(echo "$BRANCH" | sed 's|release/||')
            if ! git ls-remote --tags origin "refs/tags/v${BRANCH_VERSION}" | grep -q .; then
              echo "::error::Release $BRANCH is still in-flight (no final tag v${BRANCH_VERSION}). Only one release at a time."
              exit 1
            fi
          done

      - name: Check release branch does not already exist
        run: |
          if git ls-remote --heads origin "release/${VERSION}" | grep -q .; then
            echo "::error::Branch release/${VERSION} already exists"
            exit 1
          fi

      - name: Check RC tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}-rc.1" | grep -q .; then
            echo "::error::Tag v${VERSION}-rc.1 already exists"
            exit 1
          fi

      - name: Create release branch
        run: |
          git checkout -b "release/${VERSION}"
          git push origin "release/${VERSION}"

      - name: Create first RC tag
        run: |
          git tag "v${VERSION}-rc.1"
          git push origin "v${VERSION}-rc.1"

      - name: Publish first pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}-rc.1" \
            --title "v${VERSION}-rc.1" \
            --target "release/${VERSION}" \
            --generate-notes \
            --prerelease

      - name: Trigger promotion pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run promote.yml --ref "release/${VERSION}" -f "version=v${VERSION}-rc.1"

      - name: Summary
        run: |
          echo "## Release Cut" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** release/${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** v${VERSION}-rc.1" >> $GITHUB_STEP_SUMMARY
          echo "- **Pre-release:** v${VERSION}-rc.1 (visible on Releases page)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. The **Promote** workflow has been triggered automatically — check the Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Test will deploy automatically. Approve **preprod** and **prod** when prompted" >> $GITHUB_STEP_SUMMARY
          echo "3. If a problem is found, fix it on \`release/${VERSION}\` and run **Tag New RC** (from that branch) with version \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Check the **Releases** page to see the draft and pre-release" >> $GITHUB_STEP_SUMMARY
