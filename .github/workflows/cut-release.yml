name: Cut Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string

concurrency:
  group: cut-release

permissions:
  contents: write
  actions: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-tags: true

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Cut release
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run invoke release.cut-release --version "${{ inputs.version }}"
