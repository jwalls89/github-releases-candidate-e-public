name: Cut Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string
      commit_id:
        description: "Optional 40-char commit SHA on main. Leave blank for main tip."
        required: false
        type: string
        default: ""

concurrency:
  group: cut-release

permissions:
  contents: write
  actions: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    steps:
      - name: Normalise version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          echo "value=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_id }}

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Cut release
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run invoke release.cut-release --version "${{ steps.version.outputs.value }}" --commit-id "${{ inputs.commit_id }}"
